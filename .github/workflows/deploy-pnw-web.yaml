name: Deploy pnw-web

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "pnw-web/**"

permissions:
  id-token: write
  contents: read

jobs:
  deploy-pnw-web:
    name: Deploy pnw-web workload
    runs-on: ubuntu-latest
    environment: prd

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Preview infrastructure changes
        uses: azure/bicep-deploy@v2
        with:
          type: deployment
          operation: whatIf
          name: pnw-web-whatif
          scope: subscription
          location: westeurope
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          template-file: ./pnw-web/pnw-web.bicep
          parameters-file: ./pnw-web/pnw-web.bicepparam

      - name: Deploy infrastructure
        uses: azure/bicep-deploy@v2
        with:
          type: deployment
          operation: create
          name: pnw-web
          scope: subscription
          location: westeurope
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          template-file: ./pnw-web/pnw-web.bicep
          parameters-file: ./pnw-web/pnw-web.bicepparam